<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Planes - FitGym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div th:replace="~{fragmentos :: sidebar-fitgym (paginaActual='admin')}"></div>

    <main class="main-content">
        <h2 class="fw-bold mb-4"><i class="fas fa-id-card me-2 text-primary"></i>Gestión de Planes</h2>

        <div class="content-card p-3 p-md-4 mb-4">
            <h5 class="fw-bold mb-3">Nuevo Plan</h5>
            <form th:action="@{/planes/admin/guardar}" method="post" class="row g-3">
                <input type="hidden" name="id" value="">
                <div class="col-md-4">
                    <label class="form-label small">Nombre del Plan</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Duración (meses)</label>
                    <input type="number" name="duracionMeses" class="form-control" min="1" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Precio ($)</label>
                    <input type="number" step="0.01" name="precio" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small">Descripción</label>
                    <input type="text" name="descripcion" class="form-control">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary rounded-pill px-4">
                        <i class="fas fa-save me-2"></i>Guardar Plan
                    </button>
                </div>
            </form>
        </div>

        <div class="content-card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nombre</th>
                            <th>Duración</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th class="pe-4 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${planes}">
                            <td class="ps-4" th:text="${p.id}">1</td>
                            <td class="fw-bold" th:text="${p.nombre}">Plan</td>
                            <td th:text="${p.duracionMeses + ' meses'}">6 meses</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(p.precio, 0, 'COMMA', 2, 'POINT')}">$0.00</td>
                            <td>
                                <span class="badge" th:classappend="${p.activo} ? 'bg-success' : 'bg-danger'"
                                      th:text="${p.activo} ? 'Activo' : 'Inactivo'">Activo</span>
                            </td>
                            <td class="pe-4 text-center">
                                <form th:action="@{/planes/admin/guardar}" method="post" class="d-inline">
                                    <input type="hidden" name="id" th:value="${p.id}">
                                    <input type="hidden" name="nombre" th:value="${p.nombre}">
                                    <input type="hidden" name="descripcion" th:value="${p.descripcion}">
                                    <input type="hidden" name="duracionMeses" th:value="${p.duracionMeses}">
                                    <input type="hidden" name="precio" th:value="${p.precio}">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary rounded-3" th:if="${!p.activo}">
                                        <i class="fas fa-undo"></i> Reactivar
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
