<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Productos - FitGym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .prod-img-thumb {
            width: 50px; height: 50px; border-radius: 10px;
            object-fit: cover; background: #f0f0f0;
        }
        .prod-img-placeholder {
            width: 50px; height: 50px; border-radius: 10px;
            background: #f0f0f0; display: flex; align-items: center; justify-content: center;
            color: #ccc; font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragmentos :: sidebar-fitgym (paginaActual='admin')}"></div>

    <main class="main-content">
        <h2 class="fw-bold mb-4"><i class="fas fa-box me-2 text-primary"></i>Gesti&oacute;n de Productos</h2>

        <!-- Form -->
        <div class="content-card p-3 p-md-4 mb-4">
            <h5 class="fw-bold mb-3" id="formTitle">Nuevo Producto</h5>
            <form th:action="@{/tienda/admin/guardar}" method="post" class="row g-3" id="productForm" enctype="multipart/form-data">
                <input type="hidden" name="id" id="productId" value="">
                <div class="col-md-4">
                    <label class="form-label small">Nombre</label>
                    <input type="text" name="nombre" id="editNombre" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small">Categor&iacute;a</label>
                    <select name="categoria" id="editCategoria" class="form-select" required>
                        <option value="Proteínas">Proteínas</option>
                        <option value="Creatina">Creatina</option>
                        <option value="Pre-Entreno">Pre-Entreno</option>
                        <option value="Vitaminas">Vitaminas</option>
                        <option value="Ropa">Ropa</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Precio (S/)</label>
                    <input type="number" step="0.01" name="precio" id="editPrecio" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Stock</label>
                    <input type="number" name="stock" id="editStock" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label small">Descripci&oacute;n</label>
                    <textarea name="descripcion" id="editDescripcion" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-8">
                    <label class="form-label small">URL de Imagen (opcional si subes archivo)</label>
                    <input type="url" name="imagenUrl" id="editImagenUrl" class="form-control" placeholder="https://ejemplo.com/imagen.jpg">
                </div>
                <div class="col-md-4">
                    <label class="form-label small">O subir archivo</label>
                    <input type="file" name="imagenFile" id="editImagenFile" class="form-control" accept="image/*">
                </div>
                <div class="col-md-4 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill px-4">
                        <i class="fas fa-save me-2"></i>Guardar
                    </button>
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-3" id="btnCancelar" style="display:none;" onclick="cancelarEdicion()">
                        <i class="fas fa-times me-1"></i>Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Table -->
        <div class="content-card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Imagen</th>
                            <th>Nombre</th>
                            <th>Categor&iacute;a</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th class="pe-4 text-center">Acci&oacute;n</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${productos}">
                            <td class="ps-4">
                                <div th:if="${p.imagenUrl != null and !p.imagenUrl.isEmpty()}" class="prod-img-thumb" th:style="'background: url(' + ${p.imagenUrl} + ') center/cover no-repeat'"></div>
                                <div th:if="${p.imagenUrl == null or p.imagenUrl.isEmpty()}" class="prod-img-placeholder">
                                    <i class="fas fa-box"></i>
                                </div>
                            </td>
                            <td class="fw-bold" th:text="${p.nombre}">Producto</td>
                            <td><span class="badge bg-light text-dark border" th:text="${p.categoria}">Cat</span></td>
                            <td th:text="'S/' + ${#numbers.formatDecimal(p.precio, 0, 'COMMA', 2, 'POINT')}">S/0.00</td>
                            <td th:text="${p.stock}">10</td>
                            <td>
                                <span class="badge" th:classappend="${p.activo} ? 'bg-success' : 'bg-danger'"
                                      th:text="${p.activo} ? 'Activo' : 'Inactivo'">Activo</span>
                            </td>
                            <td class="pe-4 text-center">
                                <button class="btn btn-outline-primary btn-sm rounded-3 me-1"
                                        th:data-id="${p.id}"
                                        th:data-nombre="${p.nombre}"
                                        th:data-categoria="${p.categoria}"
                                        th:data-precio="${p.precio}"
                                        th:data-stock="${p.stock}"
                                        th:data-descripcion="${p.descripcion}"
                                        th:data-imagen="${p.imagenUrl}"
                                        onclick="editarProducto(this)">
                                    <i class="fas fa-edit"></i> Editar
                                </button>
                                <form th:action="@{/tienda/admin/eliminar}" method="post" class="d-inline">
                                    <input type="hidden" name="id" th:value="${p.id}">
                                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-3" th:if="${p.activo}">
                                        <i class="fas fa-ban"></i> Desactivar
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function editarProducto(btn) {
            document.getElementById('productId').value = btn.dataset.id;
            document.getElementById('editNombre').value = btn.dataset.nombre;
            document.getElementById('editCategoria').value = btn.dataset.categoria;
            document.getElementById('editPrecio').value = btn.dataset.precio;
            document.getElementById('editStock').value = btn.dataset.stock;
            document.getElementById('editDescripcion').value = btn.dataset.descripcion;
            document.getElementById('editImagenUrl').value = btn.dataset.imagen;
            document.getElementById('editImagenFile').value = '';
            document.getElementById('formTitle').textContent = 'Editar Producto';
            document.getElementById('btnCancelar').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function cancelarEdicion() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('editImagenFile').value = '';
            document.getElementById('formTitle').textContent = 'Nuevo Producto';
            document.getElementById('btnCancelar').style.display = 'none';
        }
    </script>
</body>
</html>
