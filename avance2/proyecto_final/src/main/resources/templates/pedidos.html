<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - FitGym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .estado-pendiente { background: #fff4e5; color: #d97706; }
        .estado-pagado { background: #ecfdf5; color: #059669; }
        .estado-enviado { background: #eef2ff; color: #4f46e5; }
        .estado-entregado { background: #ecfdf5; color: #059669; }
        .estado-cancelado { background: #ffebeb; color: #ef4444; }
    </style>
</head>
<body>
    <div th:replace="~{fragmentos :: sidebar-fitgym (paginaActual='tienda')}"></div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold" th:text="${isAdmin} ? 'Todos los Pedidos' : 'Mis Pedidos'">Pedidos</h2>
                <p class="text-muted">Historial de compras</p>
            </div>
            <a href="/tienda" class="btn btn-primary rounded-pill px-3">
                <i class="fas fa-store me-2"></i>Tienda
            </a>
        </div>

        <div th:if="${#lists.isEmpty(pedidos)}" class="text-center py-5">
            <i class="fas fa-receipt fa-3x text-muted mb-3"></i>
            <p class="text-muted">No tienes pedidos aún.</p>
            <a href="/tienda" class="btn btn-primary rounded-pill px-4">Ir a la Tienda</a>
        </div>

        <div class="row g-3" th:if="${!#lists.isEmpty(pedidos)}">
            <div class="col-12" th:each="pedido : ${pedidos}">
                <div class="content-card p-3 p-md-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h6 class="fw-bold mb-1">
                                Pedido #<span th:text="${pedido.id}">1</span>
                                <span th:if="${isAdmin}" class="small text-muted ms-2" th:text="'(' + ${pedido.usuarioEmail} + ')'">user@mail.com</span>
                            </h6>
                            <small class="text-muted" th:text="${pedido.fechaHora}">2024-01-01</small>
                        </div>
                        <div>
                            <span class="badge rounded-pill px-3 py-2"
                                  th:classappend="${pedido.estado == 'Pendiente' ? 'estado-pendiente' :
                                                   pedido.estado == 'Pagado' ? 'estado-pagado' :
                                                   pedido.estado == 'Enviado' ? 'estado-enviado' :
                                                   pedido.estado == 'Entregado' ? 'estado-entregado' :
                                                   'estado-cancelado'}"
                                  th:text="${pedido.estado}">Pendiente</span>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm table-borderless mb-2">
                            <thead class="text-muted small">
                                <tr><th>Producto</th><th class="text-center">Cant</th><th class="text-end">Subtotal</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="d : ${pedido.detalles}">
                                    <td th:text="${d.productoNombre}">Producto</td>
                                    <td class="text-center" th:text="${d.cantidad}">1</td>
                                    <td class="text-end" th:text="'S/' + ${#numbers.formatDecimal(d.subtotal, 0, 'COMMA', 2, 'POINT')}">$0.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                        <strong>Total: <span class="text-primary" th:text="'S/' + ${#numbers.formatDecimal(pedido.total, 0, 'COMMA', 2, 'POINT')}">$0.00</span></strong>

                        <form th:if="${isAdmin}" th:action="@{/tienda/actualizar-estado}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="pedidoId" th:value="${pedido.id}">
                            <select name="estado" class="form-select form-select-sm" style="width:auto;">
                                <option value="Pendiente" th:selected="${pedido.estado == 'Pendiente'}">Pendiente</option>
                                <option value="Pagado" th:selected="${pedido.estado == 'Pagado'}">Pagado</option>
                                <option value="Enviado" th:selected="${pedido.estado == 'Enviado'}">Enviado</option>
                                <option value="Entregado" th:selected="${pedido.estado == 'Entregado'}">Entregado</option>
                                <option value="Cancelado" th:selected="${pedido.estado == 'Cancelado'}">Cancelado</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-dark rounded-3">Actualizar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
