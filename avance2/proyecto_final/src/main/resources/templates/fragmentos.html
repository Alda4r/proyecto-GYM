<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="cabecera-comun">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

    <th:block th:fragment="sidebar-fitgym(paginaActual)">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="Menú">
            <i class="fas fa-bars"></i>
        </button>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <div id="sidebar" class="sidebar shadow-sm">
            <div class="brand-section d-flex align-items-center mb-5">
                <i class="fa-solid fa-dumbbell me-3"></i>
                <div>
                    <h4 class="fw-bold mb-0">Fit-Factory Gym</h4>
                    <small class="text-muted">Tu entreno personal</small>
                </div>
            </div>
            <div th:if="${session.usuarioLogueado != null && session.usuarioLogueado.email == 'admin@gym.com'}">
        <a th:href="@{/admin}" class="nav-link" th:classappend="${paginaActual == 'admin' ? 'active' : ''}">
            <i class="fas fa-user-shield me-2"></i> Gesti&oacute;n Admin
        </a>
    </div>
            <nav>
                <a th:if="${session.usuarioLogueado == null || session.usuarioLogueado.email != 'admin@gym.com'}"
                   th:href="@{/dashboard}"
                   th:class="${paginaActual == 'dashboard' ? 'nav-link active' : 'nav-link'}"><i class="fas fa-home"></i> Dashboard</a>
                <a th:href="@{/rutinas}" th:class="${paginaActual == 'rutinas' ? 'nav-link active' : 'nav-link'}"><i class="fas fa-calendar-alt"></i> Rutinas</a>
                <a th:href="@{/calorias}" th:class="${paginaActual == 'calorias' ? 'nav-link active' : 'nav-link'}"><i class="fas fa-apple-alt"></i> Calor&iacute;as</a>
                <a th:href="@{/progreso}" th:class="${paginaActual == 'progreso' ? 'nav-link active' : 'nav-link'}"><i class="fas fa-chart-line"></i> Progreso</a>
                <a th:href="@{/cuenta}" th:class="${paginaActual == 'cuenta' ? 'nav-link active' : 'nav-link'}"><i class="fas fa-user"></i> Cuenta</a>
                <a th:href="@{/planes}" th:class="${paginaActual == 'planes' ? 'nav-link active' : 'nav-link'}"><i class="fas fa-id-card"></i> Planes</a>
                <a th:href="@{/tienda}" th:class="${paginaActual == 'tienda' ? 'nav-link active' : 'nav-link'}"><i class="fas fa-store"></i> Suplementos</a>

                <div class="theme-toggle">
                    <button type="button" onclick="toggleDarkMode()" id="themeToggleBtn">
                        <i class="fas fa-moon" id="themeIcon"></i>
                        <span id="themeLabel">Modo Oscuro</span>
                    </button>
                </div>

                <div class="mt-2 pt-2 border-top">
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="nav-link text-danger" style="border: none; background: none; width: 100%; text-align: left; cursor: pointer;">
                            <i class="fas fa-power-off"></i> Salir
                        </button>
                    </form>
                </div>
            </nav>
        </div>
        <script th:src="@{/js/dark-mode.js}"></script>
        <script>
            function toggleSidebar() {
                var s = document.getElementById('sidebar');
                var o = document.getElementById('sidebarOverlay');
                if (s) { s.classList.toggle('open'); }
                if (o) { o.classList.toggle('active'); }
            }
        </script>
    </th:block>

</body>
</html>
