<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - FitGym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div th:replace="~{fragmentos :: sidebar-fitgym (paginaActual='tienda')}"></div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold">Tu Carrito</h2>
                <p class="text-muted">Revisa tus productos antes de pagar</p>
            </div>
            <a href="/tienda" class="btn btn-outline-secondary rounded-pill px-3">
                <i class="fas fa-arrow-left me-2"></i>Seguir Comprando
            </a>
        </div>

        <div th:if="${#lists.isEmpty(carrito)}" class="text-center py-5">
            <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
            <p class="text-muted">El carrito está vacío.</p>
            <a href="/tienda" class="btn btn-primary rounded-pill px-4">Ir a la Tienda</a>
        </div>

        <div th:if="${!#lists.isEmpty(carrito)}">
            <div class="content-card p-3 p-md-4 mb-4">
                <div th:each="item : ${carrito}" class="d-flex align-items-center gap-3 py-3 border-bottom">
                    <div class="flex-shrink-0">
                        <div th:if="${item.imagenUrl != null and !item.imagenUrl.isEmpty()}" style="width:60px;height:60px;border-radius:12px;background:url(' + ${item.imagenUrl} + ') center/cover no-repeat"></div>
                        <div th:if="${item.imagenUrl == null or item.imagenUrl.isEmpty()}" class="rounded-circle bg-light d-flex align-items-center justify-content-center" style="width:60px;height:60px;">
                            <i class="fas fa-dumbbell text-primary"></i>
                        </div>
                    </div>
                    <div class="flex-grow-1">
                        <h6 class="fw-bold mb-0" th:text="${item.nombre}">Producto</h6>
                        <span class="text-primary fw-bold" th:text="'$' + ${#numbers.formatDecimal(item.precio, 0, 'COMMA', 2, 'POINT')}">$0.00</span>
                    </div>
                    <form th:action="@{/tienda/actualizar}" method="post" class="d-flex align-items-center gap-2">
                        <input type="hidden" name="productoId" th:value="${item.productoId}">
                        <input type="number" name="cantidad" th:value="${item.cantidad}" min="1" class="form-control form-control-sm" style="width:60px;">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </form>
                    <div class="text-end" style="min-width:80px;">
                        <span class="fw-bold" th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 2, 'POINT')}">$0.00</span>
                    </div>
                    <form th:action="@{/tienda/eliminar}" method="post">
                        <input type="hidden" name="productoId" th:value="${item.productoId}">
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>

                <div class="d-flex justify-content-between align-items-center pt-4">
                    <h5 class="fw-bold mb-0">Total: <span class="text-primary" th:text="'$' + ${#numbers.formatDecimal(total, 0, 'COMMA', 2, 'POINT')}">$0.00</span></h5>
                    <form th:action="@{/tienda/pagar}" method="post">
                        <button type="submit" class="btn btn-success rounded-pill px-5 py-2 fw-bold">
                            <i class="fas fa-check me-2"></i>Pagar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
