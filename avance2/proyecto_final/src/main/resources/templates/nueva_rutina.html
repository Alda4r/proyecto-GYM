<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Rutina - FitGym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/rutinas.css?v=1.2}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div th:replace="~{fragmentos :: sidebar-fitgym (paginaActual='rutinas')}"></div>

    <div class="main-content">
        <div class="mb-4">
            <a th:href="@{/rutinas(tab=${tab}, objetivoFiltro=${objetivoFiltro})}"
               class="btn btn-link text-decoration-none text-secondary mb-3">
                <i class="fas fa-arrow-left me-2"></i> Volver a Rutinas
            </a>
            <h2 class="fw-bold">Crear nueva rutina</h2>
            <p class="text-muted small">Crea una rutina global y luego agrega ejercicios.</p>
        </div>

        <div class="card shadow-sm rounded-4 p-4 mb-5 bg-white">
            <form th:action="@{/rutina/nueva}" method="post">
                <input type="hidden" name="tab" th:value="${tab}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre de la rutina</label>
                        <input type="text" name="nombre" class="form-control rounded-3" placeholder="Ej. Fuerza Espalda - Peso Muerto" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">Nivel</label>
                        <select name="nivel" class="form-select rounded-3">
                            <option>Principiante</option>
                            <option>Intermedio</option>
                            <option selected>Avanzado</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">Tiempo estimado</label>
                        <input type="text" name="tiempo" class="form-control rounded-3" placeholder="45 min" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Grupo muscular</label>
                        <select name="grupoMuscular" class="form-select rounded-3">
                            <option value="Torso">Torso</option>
                            <option value="Tren Inferior">Tren Inferior</option>
                            <option value="Core">Core</option>
                            <option value="Cardio">Cardio</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Objetivo asociado</label>
                        <select name="objetivoAsociado" class="form-select rounded-3">
                            <option th:selected="${objetivoFiltro == 'Ganar Peso'}" value="Ganar Peso">Ganar Peso</option>
                            <option th:selected="${objetivoFiltro == 'Hacerse más fuerte'}" value="Hacerse más fuerte">Hacerse más fuerte</option>
                            <option th:selected="${objetivoFiltro == 'Perder Peso'}" value="Perder Peso">Perder Peso</option>
                        </select>
                    </div>

                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold">Crear y agregar ejercicios</button>
                    <a th:href="@{/rutinas(tab=${tab}, objetivoFiltro=${objetivoFiltro})}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
