spring.application.name=FitGym
server.port=${PORT:8080}

# PostgreSQL local (por defecto) — Render sobreescribe con sus variables de entorno
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitgym_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Multipart (subida de imágenes)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# JWT (sobreescribir via variable de entorno JWT_SECRET en producción)
jwt.secret=${JWT_SECRET:FitFactoryGym2026SecretKeyParaFirmarJWTDebeSerLarga!}
jwt.expiration=${JWT_EXPIRATION:86400000}