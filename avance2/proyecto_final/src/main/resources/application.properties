spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
server.port=8080

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=fitgym_db;encrypt=true;trustServerCertificate=true

# Credenciales de tu SQL Server (Pon aquí tu usuario, usualmente 'sa', y tu contraseña)
spring.datasource.username=sa
spring.datasource.password=root
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate: Crea o actualiza las tablas automáticamente basándose en tus clases Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect